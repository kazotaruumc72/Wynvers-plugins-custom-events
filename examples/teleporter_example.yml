# Example teleporter items for Nexo
# This file shows how to configure teleporter items

# Base teleporter item - use this to start configuring a new teleporter
teleporter_base:
  itemname: "§6Teleporter Configuration Tool"
  material: PAPER
  Mechanics:
    custom_block:
      type: NOTEBLOCK
      custom_variation: "476"
  Pack:
    parent_model: block/cube_all
    texture: fischvogel:fv_bettersnow/snow

