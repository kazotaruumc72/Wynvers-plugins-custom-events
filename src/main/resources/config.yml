# =====================================================================
# WynversCustomEvents – configuration
# =====================================================================
#
# WynversCustomEvents reads its actions DIRECTLY from the OreStack
# generator configuration files (one multi-document YAML per generator,
# stages separated by `---`). No separate actions file is required.
#
# Inside any stage of an OreStack generator file, you can now use the
# following keys:
#
#   on-break, on-mine, on-harvest, on-place, on-destroy,
#   on-hit, on-interact, on-growth
#
# Each key is a list of actions. Two equivalent formats are accepted:
#
#   on-break:
#     - do: giveItem NexoItems:enchanted_cobblestone
#
#   on-break:
#     - "giveItem NexoItems:enchanted_cobblestone"
#
# Supported action syntax:
#
#   giveItem NexoItems:<id>          Give 1 Nexo custom item
#   giveItem NexoItems:<id> <qty>    Give <qty> Nexo custom items
#   giveItem <MATERIAL>              Give 1 vanilla Minecraft item
#   giveItem <MATERIAL> <qty>        Give <qty> vanilla items
#   runCommand <command>             Run a command as the player
#   console <command>                Run a command as the console
#
#   Placeholder: %player% → replaced with the player's name
#
# ─────────────────────────────────────────────────────────────────────
# NEXO – wither_properties mechanic
# ─────────────────────────────────────────────────────────────────────
# Add the following section under any Nexo item's Mechanics: block to
# control Wither damage resistance for that custom block:
#
#   Mechanics:
#     custom_block:
#       type: NOTEBLOCK
#       custom_variation: 284
#       hardness: 30
#     wither_properties:
#       wither_explosion_damage: false   # false = Wither boss explosion cannot destroy this block
#       wither_damage_throw: false       # false = Wither skull projectile cannot destroy this block
#       # Optional probabilistic protection (overrides the booleans above):
#       # wither_explosion_break_block_percent: 30   # 30% chance to break per Wither body explosion
#       # wither_damage_throw_break_block_percent: 50  # 50% chance to break per Wither skull hit
#
# Both booleans default to true (vanilla behaviour) if omitted.
# Use /wcereload after editing Nexo item files to apply changes without restart.
# =====================================================================

# Path to the OreStack generators directory. Relative paths are resolved
# against the server's working directory (the folder containing the
# `plugins/` directory). Change this only if your OreStack installation
# uses a non-default location.
orestack-generators-path: "plugins/Orestack/generators"

# Path to the Nexo items directory. Change this only if your Nexo
# installation uses a non-default location.
nexo-items-path: "plugins/Nexo/items"

# Enable verbose per-block logging for the wither_properties mechanic.
# Leave false in production (a single summary line is always logged when
# at least one block is protected during an explosion).
wither-debug: false

# ─────────────────────────────────────────────────────────────────────
# NEXO – harvester mechanic
# ─────────────────────────────────────────────────────────────────────
# Add the following section under any Nexo item's Mechanics: block to
# enable the harvester on that furniture. When a player right-clicks the
# furniture with a tool, the tool takes durability damage for each nearby
# furniture found.
#
#   Mechanics:
#     custom_block:
#       type: NOTEBLOCK
#       custom_variation: 284
#     harvester:
#       scan_radius: 3          # radius in blocks to scan around clicked furniture
#       scan_height: 2          # height in blocks to scan up/down
#       damage_per_item: 1      # durability damage per furniture found
#
# All parameters are optional and use reasonable defaults if omitted.
# The harvester works in both survival and creative mode.

# Enable verbose logging for all harvester operations (debug mode)
harvester-debug: false

