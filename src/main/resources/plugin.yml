name: WynversCustomEvents
version: '${project.version}'
main: com.wynvers.customevents.WynversCustomEvents
api-version: '1.21'
description: OreStack addon that enables custom Nexo item actions in generator events

authors:
  - Wynvers

softdepend:
  - Orestack
  - Nexo
  - WorldGuard
  - WorldEdit
  - FastAsyncWorldEdit
  - PlaceholderAPI
  - RoseLoot
  - zShop
  - zMenu
  - Factions
  - SaberFactions
  - AxPickaxes

# Must enable BEFORE AxPickaxes so our AxIntegrationsLoadEvent listener is
# in place when AxPickaxes fires it (registrations after the event throw).
loadbefore:
  - AxPickaxes

commands:
  wcereload:
    description: Reloads the WynversCustomEvents actions configuration
    usage: /wcereload
    permission: wynverscustomevents.reload
    permission-message: You do not have permission to reload WynversCustomEvents.
  wce:
    description: WynversCustomEvents main command
    usage: /wce <subcommand>
    aliases: [wce]

permissions:
  wynverscustomevents.reload:
    description: Allows reloading the WynversCustomEvents configuration
    default: op
  wynverscustomevents.checkvar:
    description: Allows checking custom variation usage with /wce checkvar
    default: op
  wynverscustomevents.reloadvar:
    description: Allows reassigning duplicate custom variations with /wce reloadvar
    default: op
