# WynversCustomEvents - Harvester Storage block
#
# Companion to wynvers_harvester_machine: a 54-slot virtual chest.
#
# USAGE:
# - Right-click to open the 54-slot GUI.
# - Nearby Harvester Machines (within their `storage_search_radius`) deposit
#   their drops here automatically.
# - Place the storage block above a vanilla hopper to export items: the
#   hopper pulls one item every `hopper_pull_period_ticks * 2` ticks
#   (defaulting to ~16 ticks, vanilla speed).
# - On break the inventory contents drop on the ground.

wynvers_harvester_storage:
  itemname: "<gold>Coffre du Récolteur</gold>"
  material: PAPER
  Mechanics:
    custom_block:
      type: NOTEBLOCK
      custom_variation: 360
    harvester_storage:
      gui_title: "&8Coffre du Récolteur"
      hopper_pull_period_ticks: 8
      pickup_radius: 5.0           # blocks — all directions; sucks loose items inside this cube
      pickup_whitelist:            # Only these items get absorbed. Empty = absorb everything.
        - "nexo:barley"            # Nexo item id, prefixed with "nexo:"
        - "nexo:barley_seed"
        - "WHEAT"                  # Bare entries are treated as vanilla Material names
        - "WHEAT_SEEDS"
        - "CARROT"
        - "POTATO"
        - "BEETROOT"
        - "BEETROOT_SEEDS"
  Pack:
    parent_model: block/cube_all
    texture: wynvers:blocks/harvester_storage