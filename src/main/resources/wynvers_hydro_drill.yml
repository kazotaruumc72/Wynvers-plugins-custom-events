# Wynvers Custom Events - Hydro-Siege Drill
#
# INSTALLATION:
# 1. Place this file in: plugins/Nexo/items/
# 2. Run: /nexo reload
#
# USAGE:
# - Give to a player: /give @p paper{NexoID:"hydro_drill_commun"}
# - Place against an enemy claim wall.
# - Wait 60s (incassable). At T=0, water in the cube disappears,
#   obsidian becomes cobblestone for 30s (TNT can break it).
# - 60s cooldown per player.

hydro_drill_commun:
  itemname: "<green>Foreuse d'Assèchement commun</green>"
  material: PAPER
  Mechanics:
    custom_block:
      type: NOTEBLOCK
      custom_variation: 2
    hydro_drill:
      radius: 1                  # 3x3x3 cube (radius 1 from center block)
      countdown_seconds: 60
      obsidian_swap_seconds: 30  # window where obsidian → cobblestone
      cooldown_seconds: 60
      particle: SQUID_INK
      sound: BLOCK_BEACON_AMBIENT
  Pack:
    parent_model: block/cube_all
    texture: wynvers:blocks/hydro_drill_commun